<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eREVIEW - 30-Day Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1f3a 0%, #0d1128 100%);
            padding: 12px 20px;
            border-bottom: 2px solid rgba(204, 0, 0, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 18px;
            color: rgba(255, 215, 0, 1);
            font-weight: 500;
        }
        
        .back-btn {
            background: linear-gradient(135deg, rgba(255, 215, 0, 1) 0%, rgba(204, 153, 0, 1) 100%);
            color: rgba(0, 0, 0, 1);
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }
        
        .back-btn:hover {
            background: linear-gradient(135deg, rgba(204, 153, 0, 1) 0%, rgba(255, 215, 0, 1) 100%);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.5);
            transform: translateY(-1px);
        }
        
        .pdf-container {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        
        .pdf-wrapper {
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 100px);
            position: relative;
        }
        
        .pdf-wrapper iframe {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            background: white;
        }
        
        /* PDF fullsize button */
        .pdf-fullsize-btn {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(204, 0, 0, 1) 0%, rgba(139, 0, 0, 1) 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(204, 0, 0, 0.3);
            z-index: 10;
        }
        
        .pdf-fullsize-btn:hover {
            background: linear-gradient(135deg, rgba(139, 0, 0, 1) 0%, rgba(204, 0, 0, 1) 100%);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.5);
            transform: translateX(-50%) translateY(-1px);
        }
        
        /* PDF fullscreen overlay */
        .pdf-fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 14, 39, 0.98);
            z-index: 9999;
            overflow: auto;
        }
        
        .pdf-fullscreen-overlay.active {
            display: block;
        }
        
        .pdf-fullscreen-content {
            width: 100%;
            height: 100%;
            padding: 60px 40px 40px 40px;
        }
        
        .pdf-fullscreen-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        /* Close button for fullscreen overlays */
        .close-fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 1) 0%, rgba(204, 153, 0, 1) 100%);
            color: rgba(0, 0, 0, 1);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
            z-index: 10000;
        }
        
        .close-fullscreen-btn:hover {
            background: linear-gradient(135deg, rgba(204, 153, 0, 1) 0%, rgba(255, 215, 0, 1) 100%);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>eREVIEW - 30-Day Analysis (April 20 - May 20, 2024)</h1>
        <button class="back-btn" onclick="goBack()">← Back to Cherry Avenue Site</button>
    </div>
    
    <div class="pdf-container">
        <button class="pdf-fullsize-btn" onclick="showPDFFullscreen()" title="View PDF full screen">🔍 Full Screen</button>
        <div class="pdf-wrapper">
            <iframe src="./eREVIEW_CherryAVE-30day_240420-240520s.pdf" type="application/pdf"></iframe>
        </div>
    </div>
    
    <!-- PDF Fullscreen Overlay -->
    <div class="pdf-fullscreen-overlay" id="pdfFullscreenOverlay">
        <button class="close-fullscreen-btn" onclick="closePDFFullscreen()">✕ Return to Normal View</button>
        <div class="pdf-fullscreen-content">
            <iframe id="pdfFullscreenIframe"></iframe>
        </div>
    </div>
    
    <script>
        function goBack() {
            window.location.href = '../index.html';
        }
        
        function showPDFFullscreen() {
            const pdfIframe = document.querySelector('.pdf-wrapper iframe');
            const fullscreenIframe = document.getElementById('pdfFullscreenIframe');
            if (pdfIframe) {
                fullscreenIframe.src = pdfIframe.src;
            }
            document.getElementById('pdfFullscreenOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closePDFFullscreen() {
            document.getElementById('pdfFullscreenOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // Handle escape key to close fullscreen
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePDFFullscreen();
            }
        });
    </script>
</body>
</html>
